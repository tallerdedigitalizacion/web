    <rect x="252" y="216" width="228" height="14" rx="7"/>
    <rect x="252" y="258" width="154" height="14" rx="7"/>
  </g>
  <circle cx="468" cy="84" r="44" fill="#163620" stroke="#4ee58d"/>
