  <rect width="560" height="360" rx="8" fill="#20242c"/>
  <rect x="28" y="28" width="504" height="304" rx="8" fill="#292e38" stroke="#3a414d"/>
  <text x="52" y="70" fill="#4ee58d" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Scorecard del método</text>
  <text x="52" y="99" fill="#f7f8f7" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">Impuesto Operativo</text>
  <g fill="#3a414d">
    <rect x="52" y="132" width="176" height="14" rx="7"/>
